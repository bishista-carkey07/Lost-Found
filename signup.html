<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="login.css">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- Protocol Warning Banner -->
<div id="protocolWarning" style="
    display:none;
    background:#fff3cd;
    color:#856404;
    border:1px solid #ffc107;
    border-radius:8px;
    padding:12px 16px;
    margin:12px auto;
    max-width:340px;
    font-size:13px;
    text-align:center;
    position:relative;
    z-index:20;
">
    Warning <strong>Google Sign-In needs a local server.</strong><br>
    You're opening this as a file. Open a terminal in the project folder and run:<br>
    <code style="background:#f5f5f5;padding:3px 6px;border-radius:4px;display:inline-block;margin-top:6px;">python -m http.server 8080</code><br>
    Then visit: <a href="http://localhost:8080/signup.html" style="color:#0d6efd;">http://localhost:8080/signup.html</a>
</div>

<div class="login-container">
    <h2>Create Account</h2>
    <p class="subtitle">Sign up to continue</p>

    <div class="error" id="errorBox"></div>

    <input type="text" id="newUsername" placeholder="Username">
    <input type="tel"  id="phone"       placeholder="Phone Number">
    <input type="text" id="contact_info" placeholder="Contact Info (phone / email shown on posts)">
    <input type="password" id="newPassword" placeholder="Password">

    <button onclick="signup()">Sign Up</button>

    <!-- Divider -->
    <div class="divider"><span>or</span></div>

    <!-- Google Sign-In Button -->
    <!-- IMPORTANT: Replace YOUR_GOOGLE_CLIENT_ID below with your actual Client ID from -->
    <!-- https://console.cloud.google.com -> APIs & Services -> Credentials -->
    <!-- Also add http://localhost:8080 to Authorized JavaScript Origins -->
    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID"
         data-callback="handleGoogleAuth"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin google-btn-wrapper"
         data-type="standard"
         data-shape="rectangular"
         data-theme="outline"
         data-text="signup_with"
         data-size="large"
         data-logo_alignment="left"
         data-width="270">
    </div>

    <p class="signup-text">
        Already have an account? <a href="login.html">Login</a>
    </p>
</div>

<script src="signup.js"></script>
<script>
    // Show warning if page is opened via file:// protocol
    if (window.location.protocol === 'file:') {
        document.getElementById('protocolWarning').style.display = 'block';
    }
</script>
</body>
</html>
